<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ひらがな たんけん</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Yomogi&display=swap');

:root{
  --paper:#FAF4E6;
  --ink:#4A3728;
  --red:#E2725B;
  --blue:#5B8DD9;
  --blue-deep:#3F6BB8;
  --green:#6FAE5E;
  --orange:#F2A444;
  --yellow:#F4C95D;
  --line:#C9BBA0;
}

*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}

html,body{
  margin:0; padding:0;
  width:100%;
  background:var(--paper);
  font-family:'Yomogi','Hiragino Maru Gothic ProN','Rounded Mplus 1c',sans-serif;
  color:var(--ink);
  overscroll-behavior:none;
  user-select:none;
  -webkit-user-select:none;
}

#app{
  max-width:720px;
  margin:0 auto;
  padding:10px 10px 18px;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  gap:10px;
  position:relative;
}

/* ---------- HEADER ---------- */
.header-row{
  display:flex;
  gap:8px;
  align-items:stretch;
}
.box{
  background:#FFFDF8;
  border:3px solid var(--ink);
  border-radius:16px;
  box-shadow:2px 3px 0 rgba(0,0,0,0.08);
}
.level-box{
  border-color:var(--red);
  flex:1 1 auto;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:6px 10px;
  min-width:78px;
}
.level-box .lv-label{
  font-size:15px;
  font-weight:bold;
  letter-spacing:1px;
}

.hp-box{
  border-color:var(--green);
  flex:1 1 auto;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:6px 10px;
  min-width:96px;
  gap:2px;
}
.hp-text{font-size:14px; font-weight:bold;}
.hp-hearts{font-size:18px; letter-spacing:1px;}
.hp-hearts span.lost{filter:grayscale(1) opacity(0.3);}

/* ---------- MAIN (ILLUST & ANSWER) ---------- */
.main-row{
  display:flex;
  gap:10px;
  align-items:stretch;
  flex:0 0 auto;
}
.illust-box{
  flex:1 1 40%;
  background:#FFFDF8;
  border:3px solid var(--ink);
  border-radius:20px;
  box-shadow:2px 3px 0 rgba(0,0,0,0.08);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:8px;
  min-height:110px;
  height:110px;
}
.illust-box svg{width:100%; height:100%; max-height:100px;}

.answer-box{
  flex:1 1 60%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:6px;
  padding:4px;
  position:relative;
}
.target-text{
  display:flex;
  gap:8px;
}
.target-char{
  font-size:clamp(24px, 6vw, 40px);
  line-height:1;
  font-weight:bold;
}
.input-boxes{
  display:flex;
  gap:8px;
}
.input-box{
  width:clamp(34px, 9vw, 46px);
  height:clamp(34px, 9vw, 46px);
  border:3px dashed var(--line);
  border-radius:10px;
  background:#FFFDF8;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:clamp(20px, 6vw, 30px);
  font-weight:bold;
  transition: border-color 0.15s ease, background-color 0.15s ease;
}
/* 正解・入力確定時のスタイル */
.input-box.filled{
  border-style:solid;
  border-color:var(--green);
  background:#F1FAEE;
}
/* 濁点待ち（仮入力）時のスタイル */
.input-box.filled-temp{
  border-style:solid;
  border-color:var(--orange);
  background:#FFF9E6;
}

.feedback-pop{
  position:absolute;
  font-size:54px;
  font-weight:bold;
  opacity:0;
  pointer-events:none;
  top:-10px;
  left:50%;
  transform:translateX(-50%);
}
.feedback-pop.show-correct{
  color:var(--green);
  animation:popIn 0.7s ease forwards;
}
.feedback-pop.show-wrong{
  color:var(--red);
  animation:popIn 0.5s ease forwards;
}
@keyframes popIn{
  0%{opacity:0; transform:translateX(-50%) scale(0.4);}
  30%{opacity:1; transform:translateX(-50%) scale(1.15);}
  70%{opacity:1; transform:translateX(-50%) scale(1);}
  100%{opacity:0; transform:translateX(-50%) scale(1);}
}

/* ---------- GOJUON TABLE ---------- */
.table-wrap{
  background:#FFFDF8;
  border:3px solid var(--ink);
  border-radius:18px;
  box-shadow:2px 3px 0 rgba(0,0,0,0.08);
  padding:10px 10px 6px;
  overflow-x:auto;
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
}
.gojuon{
  display:flex;
  flex-direction:row-reverse;
  gap:5px;
  width:max-content;
  margin:0 auto;
}
.column{
  display:flex;
  flex-direction:column;
  gap:5px;
  border-right:1px solid var(--line);
  padding:0 5px;
}
.column:first-child{border-right:none;}
.kana-btn{
  width:43px;
  height:43px;
  font-size:21px;
  font-family:inherit;
  font-weight:bold;
  color:var(--ink);
  background:#FFFDF8;
  border:2px solid var(--ink);
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:transform 0.08s ease, background 0.08s ease;
}
.kana-btn:active{
  transform:scale(0.88);
  background:#F4ECD8;
}
.kana-blank{
  width:43px;
  height:43px;
}
.special-column{
  border-right:2px dashed var(--line);
  margin-right:2px;
  padding-right:8px;
}
.kana-btn.dakuten-btn{
  background:var(--yellow);
  border-color:var(--ink);
}
.kana-btn.dakuten-btn.toggle-active{
  background:var(--orange);
  color:#fff;
  box-shadow:0 0 0 3px var(--red) inset;
  animation: pulse 0.8s infinite alternate;
}
@keyframes pulse {
  0% { transform: scale(1); }
  100% { transform: scale(1.08); }
}
.kana-btn.sokuon-btn{
  background:#EAF6E9;
}
.special-caption{
  font-size:10px;
  text-align:center;
  color:var(--ink);
  line-height:1.2;
  margin-top:2px;
}

/* ---------- FOOTER ---------- */
.footer-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  flex:0 0 auto;
}
.sound-btn{
  width:48px;
  height:48px;
  border-radius:50%;
  border:3px solid var(--ink);
  background:var(--yellow);
  font-size:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  box-shadow:2px 3px 0 rgba(0,0,0,0.08);
}
.score-box{
  flex:1;
  text-align:center;
  background:#FFFDF8;
  border:3px solid var(--ink);
  border-radius:14px;
  padding:8px 10px;
  font-size:15px;
  font-weight:bold;
  box-shadow:2px 3px 0 rgba(0,0,0,0.08);
}
.quit-btn{
  border-radius:14px;
  border:3px solid var(--ink);
  background:var(--orange);
  padding:10px 18px;
  font-size:16px;
  font-weight:bold;
  font-family:inherit;
  color:var(--ink);
  cursor:pointer;
  box-shadow:2px 3px 0 rgba(0,0,0,0.08);
}

/* ---------- OVERLAYS ---------- */
.flash-overlay{
  position:fixed;
  inset:0;
  background:rgba(220,60,60,0.45);
  opacity:0;
  pointer-events:none;
  z-index:30;
}
.flash-overlay.flashing{
  animation:flashAnim 0.5s ease;
}
@keyframes flashAnim{
  0%{opacity:0;}
  20%{opacity:1;}
  100%{opacity:0;}
}

.center-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.45);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:40;
  flex-direction:column;
  gap:14px;
}
.center-overlay.active{display:flex;}
.overlay-card{
  background:#FFFDF8;
  border:4px solid var(--ink);
  border-radius:24px;
  padding:30px 40px;
  text-align:center;
  box-shadow:4px 6px 0 rgba(0,0,0,0.15);
}
.overlay-card .big{
  font-size:42px;
  font-weight:bold;
  margin:0;
}
.overlay-card.gameover .big{color:var(--red);}
.overlay-card.levelup .big{color:var(--blue-deep);}
.overlay-card .sub{
  margin-top:8px;
  font-size:18px;
}
.sparkle{
  font-size:30px;
  animation:spin 1.2s linear infinite;
  display:inline-block;
}
@keyframes spin{
  0%{transform:rotate(0deg) scale(1);}
  50%{transform:rotate(180deg) scale(1.3);}
  100%{transform:rotate(360deg) scale(1);}
}

@media (max-width:480px){
  .kana-btn{
    width:36px;
    height:36px;
    font-size:17px;
  }
  .kana-blank{
    width:36px;
    height:36px;
  }
  .target-char{font-size:clamp(22px,6vw,32px);}
  .input-box{width:clamp(30px,8vw,36px); height:clamp(30px,8vw,36px);}
}

/* ---------- START SCREEN ---------- */
.start-screen{
  position:fixed;
  inset:0;
  background:var(--paper);
  z-index:60;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}
.start-screen.hidden{display:none;}
.start-card{
  background:#FFFDF8;
  border:4px solid var(--ink);
  border-radius:28px;
  box-shadow:4px 6px 0 rgba(0,0,0,0.12);
  padding:34px 30px;
  max-width:420px;
  width:100%;
  text-align:center;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:14px;
}
.start-title{
  font-size:clamp(28px,8vw,38px);
  font-weight:bold;
  color:var(--blue-deep);
  margin:0;
}
.start-sub{
  font-size:16px;
  line-height:1.6;
  margin:0;
  color:var(--ink);
}
.start-btn{
  margin-top:6px;
  font-family:inherit;
  font-size:22px;
  font-weight:bold;
  color:#fff;
  background:var(--green);
  border:3px solid var(--ink);
  border-radius:18px;
  padding:14px 40px;
  cursor:pointer;
  box-shadow:2px 4px 0 rgba(0,0,0,0.15);
}
.start-btn:active{transform:translateY(2px); box-shadow:1px 2px 0 rgba(0,0,0,0.15);}

</style>
</head>
<body>

<div class="start-screen" id="startScreen">
  <div class="start-card">
    <h1 class="start-title">ひらがな たんけん</h1>
    <p class="start-sub">えを みて、したの ひらがなボタンを<br>じゅんに おしてね！</p>
    <button class="start-btn" id="startBtn" type="button">▶ はじめる</button>
  </div>
</div>

<div id="app">

  <!-- HEADER -->
  <div class="header-row">
    <div class="box level-box">
      <div class="lv-label" id="levelLabel">LEVEL 1</div>
    </div>

    <div class="box hp-box">
      <div class="hp-text">HP <span id="hpNum">5</span>/5</div>
      <div class="hp-hearts" id="hpHearts">❤️❤️❤️❤️❤️</div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main-row">
    <div class="illust-box" id="illustBox"></div>
    <div class="answer-box">
      <div class="feedback-pop" id="feedbackPop"></div>
      <div class="target-text" id="targetText"></div>
      <div class="input-boxes" id="inputBoxes"></div>
    </div>
  </div>

  <!-- GOJUON TABLE -->
  <div class="table-wrap">
    <div class="gojuon" id="gojuonTable"></div>
  </div>

  <!-- FOOTER -->
  <div class="footer-row">
    <button class="sound-btn" id="soundBtn" aria-label="おん">🔊</button>
    <div class="score-box">🚩 せいかいすう <span id="scoreNum">0</span>/10</div>
    <button class="quit-btn" id="quitBtn">やめる</button>
  </div>

</div>

<div class="flash-overlay" id="flashOverlay"></div>

<div class="center-overlay" id="levelUpOverlay">
  <div class="overlay-card levelup">
    <div class="big"><span class="sparkle">✨</span> LEVEL UP! <span class="sparkle">✨</span></div>
    <div class="sub" id="levelUpSub">LEVEL 1 → LEVEL 2</div>
  </div>
</div>

<div class="center-overlay" id="gameOverOverlay">
  <div class="overlay-card gameover">
    <div class="big">GAME OVER</div>
    <div class="sub">またチャレンジしよう！</div>
  </div>
</div>

<script>
/* =====================================================
   データ定義
===================================================== */
// レベル1: みのまわりのもの・どうぶつ（あめ、きのこ、けしごむを補充）
const WORDS_LV1 = ["あめ","いぬ","ねこ","きのこ","けしごむ","ほん","みず","やま","かわ","ふね"];

// レベル2: やさいのなまえ
const WORDS_LV2 = ["なす","とまと","ねぎ","だいこん","にんじん","れんこん","たまねぎ","ごぼう","さつまいも","すいか"];

// レベル3: くだもののなまえ
const WORDS_LV3 = ["りんご","みかん","いちご","めろん","ぶどう","ばなな","もも","くり","かき","なし"];

// レベル4: りょうりのなまえ
const WORDS_LV4 = ["おにぎり","ぱん","べんとう","うどん","らーめん","たこやき","かれーらいす","てんぷら","やきめし","すし"];

// レベル5: まだ出ていないお野菜、果物、おやつ・食べ物
const WORDS_LV5 = ["きゃべつ","かぼちゃ","ぴーまん","とうもろこし","さくらんぼ","れもん","ぱいなっぷる","けーき","ぷりん","さんどいっち"];

const GOJUON_COLUMNS = [
  ["あ","い","う","え","お"],
  ["か","き","く","け","こ"],
  ["さ","し","す","せ","そ"],
  ["た","ち","つ","て","と"],
  ["な","に","ぬ","ね","の"],
  ["は","ひ","ふ","へ","ほ"],
  ["ま","み","む","め","も"],
  ["や","","ゆ","","よ"],
  ["ら","り","る","れ","ろ"],
  ["わ","","を","","ん"]
];

// 濁音（〃）変換対応表
const DAKUTEN_MAP = {
  "か":"が","き":"ぎ","く":"ぐ","け":"げ","こ":"ご",
  "さ":"ざ","し":"じ","す":"ず","せ":"ぜ","そ":"ぞ",
  "た":"だ","ち":"ぢ","つ":"づ","て":"で","と":"ど",
  "は":"ば","ひ":"び","ふ":"ぶ","へ":"べ","ほ":"ぼ"
};

// 濁音から清音を求める逆引き用マップの自動生成
const SEION_MAP = {};
for(const seion in DAKUTEN_MAP){
  const daku = DAKUTEN_MAP[seion];
  SEION_MAP[daku] = seion;
}

// 半濁音（゜）変換対応表
const HANDAKUTEN_MAP = {
  "は":"ぱ","ひ":"ぴ","ふ":"ぷ","へ":"ぺ","ほ":"ぽ"
};

// 半濁音から清音を求める逆引き用マップの自動生成
const SEION_HAN_MAP = {};
for(const seion in HANDAKUTEN_MAP){
  const han = HANDAKUTEN_MAP[seion];
  SEION_HAN_MAP[han] = seion;
}

/* =====================================================
   イラスト (SVG) 定義
===================================================== */
function illustrationFor(word){
  switch(word){
    // --- LEVEL 1 単語 ---
    case "あめ": return svgAme();
    case "いぬ": return svgDog();
    case "ねこ": return svgCat();
    case "きのこ": return svgKinoko();
    case "けしごむ": return svgKeshigomu();
    case "ほん": return svgBook();
    case "みず": return svgWater();
    case "やま": return svgMountain();
    case "かわ": return svgRiver();
    case "ふね": return svgBoat();

    // --- LEVEL 2 野菜単語 ---
    case "なす": return svgNasu();
    case "とまと": return svgTomato();
    case "ねぎ": return svgNegi();
    case "だいこん": return svgDaikon();
    case "にんじん": return svgNinjin();
    case "れんこん": return svgRenkon();
    case "たまねぎ": return svgTamanegi();
    case "ごぼう": return svgGobou();
    case "さつまいも": return svgSatsumaimo();
    case "すいか": return svgSuika();

    // --- LEVEL 3 果物単語 ---
    case "りんご": return svgRingo();
    case "みかん": return svgMikan();
    case "いちご": return svgIchigo();
    case "めろん": return svgMeron();
    case "ぶどう": return svgBudou();
    case "ばなな": return svgBanana();
    case "もも": return svgMomo();
    case "くり": return svgKuri();
    case "かき": return svgKaki();
    case "なし": return svgNashi();

    // --- LEVEL 4 料理単語 ---
    case "おにぎり": return svgOnigiri();
    case "ぱん": return svgPan();
    case "べんとう": return svgBento();
    case "うどん": return svgUdon();
    case "らーめん": return svgRamen();
    case "たこやき": return svgTakoyaki();
    case "かれーらいす": return svgCurry();
    case "てんぷら": return svgTempura();
    case "やきめし": return svgYakimeshi();
    case "すし": return svgSushi();

    // --- LEVEL 5 新規単語 (やさい、くだもの、食べ物) ---
    case "きゃべつ": return svgKyabetsu();
    case "かぼちゃ": return svgKabocha();
    case "ぴーまん": return svgPiiman();
    case "とうもろこし": return svgToumorokoshi();
    case "さくらんぼ": return svgSakuranbo();
    case "れもん": return svgRemon();
    case "ぱいなっぷる": return svgPainappuru();
    case "けーき": return svgKeki();
    case "ぷりん": return svgPurin();
    case "さんどいっち": return svgSandoitchi();
    default: return "";
  }
}

/* --- LEVEL 1 イラスト --- */
function svgAme(){
  return `<svg viewBox="0 0 200 200">
    <!-- ねじりキャンディ(あめ) -->
    <path d="M50 100 L25 75 L25 125 Z" fill="#F2A444" stroke="#4A3728" stroke-width="5"/>
    <path d="M150 100 L175 75 L175 125 Z" fill="#F2A444" stroke="#4A3728" stroke-width="5"/>
    <circle cx="100" cy="100" r="45" fill="#E2725B" stroke="#4A3728" stroke-width="5"/>
    <path d="M80 62 Q100 100 80 138" fill="none" stroke="#FFFDF8" stroke-width="5" stroke-linecap="round"/>
    <path d="M120 62 Q100 100 120 138" fill="none" stroke="#FFFDF8" stroke-width="5" stroke-linecap="round"/>
  </svg>`;
}

function svgDog(){
  return `<svg viewBox="0 0 200 200">
    <ellipse cx="100" cy="115" rx="55" ry="48" fill="#E8C49A" stroke="#4A3728" stroke-width="5"/>
    <path d="M55 80 Q35 40 60 55 Q70 75 70 90 Z" fill="#C99355" stroke="#4A3728" stroke-width="5"/>
    <path d="M145 80 Q165 40 140 55 Q130 75 130 90 Z" fill="#C99355" stroke="#4A3728" stroke-width="5"/>
    <ellipse cx="100" cy="130" rx="22" ry="16" fill="#F5E2C8" stroke="#4A3728" stroke-width="4"/>
    <circle cx="80" cy="105" r="6" fill="#4A3728"/>
    <circle cx="120" cy="105" r="6" fill="#4A3728"/>
    <ellipse cx="100" cy="125" rx="6" ry="5" fill="#4A3728"/>
    <path d="M92 138 Q100 145 108 138" fill="none" stroke="#4A3728" stroke-width="3" stroke-linecap="round"/>
  </svg>`;
}

function svgCat(){
  return `<svg viewBox="0 0 200 200">
    <ellipse cx="100" cy="118" rx="52" ry="45" fill="#F0B96B" stroke="#4A3728" stroke-width="5"/>
    <path d="M60 85 L48 48 L82 72 Z" fill="#F0B96B" stroke="#4A3728" stroke-width="5"/>
    <path d="M140 85 L152 48 L118 72 Z" fill="#F0B96B" stroke="#4A3728" stroke-width="5"/>
    <circle cx="82" cy="112" r="6" fill="#4A3728"/>
    <circle cx="118" cy="112" r="6" fill="#4A3728"/>
    <path d="M93 128 L107 128 L100 136 Z" fill="#4A3728"/>
    <line x1="55" y1="125" x2="25" y2="118" stroke="#4A3728" stroke-width="3" stroke-linecap="round"/>
    <line x1="55" y1="133" x2="25" y2="135" stroke="#4A3728" stroke-width="3" stroke-linecap="round"/>
    <line x1="145" y1="125" x2="175" y2="118" stroke="#4A3728" stroke-width="3" stroke-linecap="round"/>
    <line x1="145" y1="133" x2="175" y2="135" stroke="#4A3728" stroke-width="3" stroke-linecap="round"/>
  </svg>`;
}

function svgKinoko(){
  return `<svg viewBox="0 0 200 200">
    <!-- 赤いきのこ -->
    <path d="M85 110 L85 160 C85 170 115 170 115 160 L115 110 Z" fill="#FFFDF8" stroke="#4A3728" stroke-width="5"/>
    <path d="M40 110 C40 50 160 50 160 110 C140 115 60 115 40 110 Z" fill="#E2725B" stroke="#4A3728" stroke-width="5"/>
    <circle cx="75" cy="80" r="10" fill="#FFFDF8"/>
    <circle cx="125" cy="80" r="10" fill="#FFFDF8"/>
    <circle cx="100" cy="65" r="7" fill="#FFFDF8"/>
    <circle cx="100" cy="100" r="8" fill="#FFFDF8"/>
  </svg>`;
}

function svgKeshigomu(){

/* =====================================================
   サウンド (Web Audio API)
===================================================== */
let audioCtx = null;
let muted = false;

// Web Audio APIの初期設定とアンロック
function ensureAudio(){
  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if(audioCtx.state === "suspended") {
    audioCtx.resume();
  }
}

function unlockAudio() {
  ensureAudio();
  if (audioCtx) {
    const buffer = audioCtx.createBuffer(1, 1, 22050);
    const source = audioCtx.createBufferSource();
    source.buffer = buffer;
    source.connect(audioCtx.destination);
    source.start(0);
  }
}

function tone(freq, start, dur, type, vol){
  if(muted) return;
  ensureAudio();
  if(!audioCtx || audioCtx.state === "suspended") return;

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || "sine";
  osc.frequency.value = freq;
  gain.gain.value = vol || 0.18;
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  const t0 = audioCtx.currentTime + start;
  osc.start(t0);
  gain.gain.setValueAtTime(gain.gain.value, t0);
  gain.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
  osc.stop(t0 + dur + 0.02);
}

function playCorrect(){ 
  ensureAudio(); 
  tone(880, 0, 0.12, "sine", 0.2); 
  tone(1320, 0.13, 0.18, "sine", 0.22); 
}

function playWrong(){ 
  ensureAudio(); 
  tone(392, 0, 0.18, "triangle", 0.25); 
}

function playDamage(){ 
  playWrong(); 
}

function playFanfare(){
  ensureAudio();
  [523,659,784,1046].forEach((f,i)=> tone(f, i*0.15, 0.25, "triangle", 0.2));
}

function playGameOver(){
  ensureAudio();

}

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

/* -----------------------------------------------------
   五十音表の動的生成（特殊列を2列にして配置を美しく整列！）
----------------------------------------------------- */
function buildGojuonTable(){
  els.gojuonTable.innerHTML = "";
  GOJUON_COLUMNS.forEach(col => {
    const colDiv = document.createElement("div");
    colDiv.className = "column";
    col.forEach(ch => {
      if(ch === ""){
        const blank = document.createElement("div");
        blank.className = "kana-blank";
        colDiv.appendChild(blank);
      } else {
        const btn = document.createElement("button");
        btn.className = "kana-btn";
        btn.type = "button";
        btn.textContent = ch;
        btn.addEventListener("click", () => handleLetterClick(ch));
        colDiv.appendChild(btn);
      }
    });
    els.gojuonTable.appendChild(colDiv);
  });

  // 特殊列1（左端から2番目）：記号グループ（〃、゜、ー、空白、空白）
  const specialCol1 = document.createElement("div");
  specialCol1.className = "column special-column";

  // 1. 濁点
  const dakutenBtn = document.createElement("button");
  dakutenBtn.className = "kana-btn dakuten-btn";
  dakutenBtn.type = "button";
  dakutenBtn.textContent = "〃";
  dakutenBtn.addEventListener("click", () => handleDakutenClick());
  specialCol1.appendChild(dakutenBtn);
  els.dakutenBtn = dakutenBtn;

  // 2. 半濁点
  const handakutenBtn = document.createElement("button");
  handakutenBtn.className = "kana-btn dakuten-btn";
  handakutenBtn.type = "button";
  handakutenBtn.textContent = "゜";
  handakutenBtn.addEventListener("click", () => handleHandakutenClick());

  // 3. 長音「ー」

  choonBtn.className = "kana-btn sokuon-btn";
  choonBtn.type = "button";
  choonBtn.textContent = "ー";
  choonBtn.addEventListener("click", () => handleLetterClick("ー"));
  specialCol1.appendChild(choonBtn);

  // 空きを埋めるためのブランク
  for(let i = 0; i < 2; i++){
    const blank = document.createElement("div");
    blank.className = "kana-blank";
    specialCol1.appendChild(blank);
  }

  els.gojuonTable.appendChild(specialCol1);

  // 特殊列2（左端）：小書きグループ（っ、ゃ、ゅ、ょ、空白）

  // 2. 拗音（ゃ、ゅ、ょ）
  ["ゃ","ゅ","ょ"].forEach(ch => {
    const btn = document.createElement("button");
    btn.className = "kana-btn sokuon-btn";
    btn.type = "button";
    btn.textContent = ch;
    btn.addEventListener("click", () => handleLetterClick(ch));
    specialCol2.appendChild(btn);
  });

  // 空きを埋めるためのブランク
  const blankCol2 = document.createElement("div");
  blankCol2.className = "kana-blank";
  specialCol2.appendChild(blankCol2);

  els.gojuonTable.appendChild(specialCol2);
}

function renderHeader(){
  els.levelLabel.textContent = "LEVEL " + level;
  els.hpNum.textContent = hp;
  let hearts = "";
  for(let i=0;i<5;i++){
    hearts += i < hp ? "❤️" : "<span class=\"lost\">🤍</span>";
  }
  els.hpHearts.innerHTML = hearts;
  els.scoreNum.textContent = score;
}

// レベルによって身の回り、野菜、果物、料理、特別なたべものを切り替える
function prepareLevelQuestions(){
  const mode = (level - 1) % 5 + 1;
  let wordList;
  if(mode === 1){
    wordList = WORDS_LV1;
  } else if(mode === 2){
    wordList = WORDS_LV2;
  } else if(mode === 3){
    wordList = WORDS_LV3;
  } else if(mode === 4){
    wordList = WORDS_LV4;
  } else {
    wordList = WORDS_LV5;
  }
  questionsQueue = shuffle(wordList);
  questionIndex = 0;
  score = 0;
}

function renderQuestion(){
  els.illustBox.innerHTML = illustrationFor(currentWord);
  els.targetText.innerHTML = "";
  els.inputBoxes.innerHTML = "";
  for(const ch of currentWord){
    const t = document.createElement("div");
    t.className = "target-char";
    t.textContent = ch;
    els.targetText.appendChild(t);

    const b = document.createElement("div");
    b.className = "input-box";
    els.inputBoxes.appendChild(b);
  }
}

function showQuestion(){
  if(questionIndex >= questionsQueue.length){
    levelUp();
    return;
  }
  currentWord = questionsQueue[questionIndex];
  currentInputIndex = 0;
  dakutenWait = false;
  handakutenWait = false;
  if(els.dakutenBtn) els.dakutenBtn.classList.remove("toggle-active");
  if(els.handakutenBtn) els.handakutenBtn.classList.remove("toggle-active");
  renderQuestion();
  startTimer();
}

function startTimer(){
  clearInterval(timerInterval);
  timeLeft = 10.0;
  timerInterval = setInterval(() => {
    timeLeft -= 0.1;
    if(timeLeft <= 0){
      timeLeft = 0;
      clearInterval(timerInterval);
      onTimeUp();
      return;
    }
  }, 100);
}

function showFeedback(type){
  els.feedbackPop.classList.remove("show-correct","show-wrong");
  els.feedbackPop.textContent = type === "correct" ? "〇" : "×";
  void els.feedbackPop.offsetWidth;
  els.feedbackPop.classList.add(type === "correct" ? "show-correct" : "show-wrong");
}

function dealDamage(){
  hp -= 1;
  renderHeader();
  els.flashOverlay.classList.remove("flashing");
  void els.flashOverlay.offsetWidth;
  els.flashOverlay.classList.add("flashing");
}

/* -----------------------------------------------------
   通常文字ボタンのタップ処理
----------------------------------------------------- */
function handleLetterClick(ch){
  if(!gameActive) return;
  ensureAudio();

  // もし濁点・半濁点待ちの状態で、記号ボタンを押さずに別の文字を押したら、エラーにして仮入力状態を解除
  if (dakutenWait || handakutenWait) {
    playWrong();
    showFeedback("wrong");
    dealDamage();
    resetTempState();
    checkGameOver();
    return;
  }

  const expected = currentWord[currentInputIndex];
  const expectedSeionDaku = SEION_MAP[expected]; // 期待される文字が「濁音」の場合、その清音
  const expectedSeionHan = SEION_HAN_MAP[expected];  // 期待される文字が「半濁音」の場合、その清音

  if (expectedSeionDaku) {
    // 期待されるのが「濁音」で、正しい「清音」が押された場合（仮入力状態にする）
    if (ch === expectedSeionDaku) {
      setTempChar(ch);
      dakutenWait = true;
      if (els.dakutenBtn) els.dakutenBtn.classList.add("toggle-active"); // 〃ボタンを点滅させて促す
      startTimer();
    } else {
      handleIncorrectInput();
    }
  } else if (expectedSeionHan) {
    // 期待されるのが「半濁音」で、正しい「清音」が押された場合（仮入力状態にする）
    if (ch === expectedSeionHan) {
      setTempChar(ch);
      handakutenWait = true;
      if (els.handakutenBtn) els.handakutenBtn.classList.add("toggle-active"); // ゜ボタンを点滅させて促す
      startTimer();
    } else {
      handleIncorrectInput();
    }
  } else {
    // 期待されるのが「清音」や「長音」などで、正しいボタンが押された場合
    if(ch === expected){
      commitChar(ch);
    } else {
      handleIncorrectInput();
    }
  }
}

/* -----------------------------------------------------
   濁点「〃」ボタンのタップ処理
----------------------------------------------------- */
function handleDakutenClick() {
  if(!gameActive) return;
  ensureAudio();

  // 正しく濁点待ちの状態のとき
  if (dakutenWait) {
    const expected = currentWord[currentInputIndex];
    commitChar(expected);
    dakutenWait = false;
    if (els.dakutenBtn) els.dakutenBtn.classList.remove("toggle-active");
  } else {
    handleIncorrectInput();
  }
}

/* -----------------------------------------------------
   半濁点「゜」ボタンのタップ処理
----------------------------------------------------- */
function handleHandakutenClick() {
  if(!gameActive) return;
  ensureAudio();

  // 正しく半濁点待ちの状態のとき
  if (handakutenWait) {
    const expected = currentWord[currentInputIndex];
    commitChar(expected);
    handakutenWait = false;
    if (els.handakutenBtn) els.handakutenBtn.classList.remove("toggle-active");
  } else {
    handleIncorrectInput();
  }
}

/* -----------------------------------------------------
   各種文字入力の共通ヘルパー関数
----------------------------------------------------- */
function setTempChar(ch) {
  const boxes = els.inputBoxes.children;
  boxes[currentInputIndex].textContent = ch;
  boxes[currentInputIndex].classList.add("filled-temp");
}

function commitChar(ch) {
  const boxes = els.inputBoxes.children;
  boxes[currentInputIndex].textContent = ch;
  boxes[currentInputIndex].classList.remove("filled-temp");
  boxes[currentInputIndex].classList.add("filled");
  currentInputIndex++;
  
  if(currentInputIndex >= currentWord.length){
    clearInterval(timerInterval);
    playCorrect();
    showFeedback("correct");
    score++;
    renderHeader();
    questionIndex++;
    gameActive = false;
    const myToken = gameToken;
    setTimeout(() => {
      if(myToken !== gameToken) return;
      gameActive = true;
      showQuestion();
    }, 1000);
  } else {
    startTimer();
  }
}

function handleIncorrectInput() {
  playWrong();
  showFeedback("wrong");
  dealDamage();
  checkGameOver();
}

function checkGameOver() {
  if(hp <= 0){
    gameActive = false;
    clearInterval(timerInterval);
    const myToken = gameToken;
    setTimeout(() => { if(myToken === gameToken) gameOver(); }, 700);
  }
}

/* -----------------------------------------------------
   入力間違い・リセット時の処理
----------------------------------------------------- */
function resetTempState() {
  dakutenWait = false;
  handakutenWait = false;
  if (els.dakutenBtn) els.dakutenBtn.classList.remove("toggle-active");
  if (els.handakutenBtn) els.handakutenBtn.classList.remove("toggle-active");
  const boxes = els.inputBoxes.children;
  if (boxes[currentInputIndex]) {
    boxes[currentInputIndex].textContent = "";
    boxes[currentInputIndex].classList.remove("filled-temp");
  }
}

function onTimeUp(){
  gameActive = false;
  resetTempState();
  playDamage(); 
  dealDamage();
  const myToken = gameToken;
  if(hp <= 0){
    setTimeout(() => { if(myToken === gameToken) gameOver(); }, 700);
  } else {
    questionIndex++;
    setTimeout(() => {
      if(myToken !== gameToken) return;
      gameActive = true;
      showQuestion();
    }, 900);
  }
}

/* -----------------------------------------------------
   レベルアップ時の処理 (1〜5)
----------------------------------------------------- */
function levelUp(){
  gameActive = false;
  clearInterval(timerInterval);
  playFanfare();
  const nextLevel = level + 1;
  const mode = (nextLevel - 1) % 5 + 1;
  
  let challengeMsg = "";
  if(mode === 1){
    challengeMsg = "みのまわりの ものに チャレンジ！";
  } else if(mode === 2){
    challengeMsg = "やさいの なまえに チャレンジ！";
  } else if(mode === 3){
    challengeMsg = "くだものの なまえに チャレンジ！";
  } else if(mode === 4){
    challengeMsg = "りょうりの なまえに チャレンジ！";
  } else {
    challengeMsg = "とくべつな たべものに チャレンジ！";
  }

  els.levelUpSub.innerHTML = `LEVEL ${level} → LEVEL ${nextLevel}<br><span style="font-size:16px;color:var(--orange);font-weight:bold;margin-top:4px;display:inline-block;">${challengeMsg}</span>`;
  els.levelUpOverlay.classList.add("active");
  level++;
  renderHeader();
  const myToken = gameToken;
  setTimeout(() => {
    if(myToken !== gameToken) return;
    els.levelUpOverlay.classList.remove("active");
    prepareLevelQuestions();
    renderHeader();
    gameActive = true;
    showQuestion();
  }, 2200);
}

function gameOver(){
  gameActive = false;
  clearInterval(timerInterval);
  playGameOver();
  els.gameOverOverlay.classList.add("active");
  const myToken = gameToken;
  setTimeout(() => {
    if(myToken !== gameToken) return;
    els.gameOverOverlay.classList.remove("active");
    startGame();
  }, 3000);
}

function startGame(){
  gameToken++;
  clearInterval(timerInterval);
  level = 1;
  hp = 5;
  score = 0;
  dakutenWait = false;
  handakutenWait = false;
  if (els.dakutenBtn) els.dakutenBtn.classList.remove("toggle-active");
  if (els.handakutenBtn) els.handakutenBtn.classList.remove("toggle-active");
  gameActive = true;
  renderHeader();
  prepareLevelQuestions();
  showQuestion();
}

/* ---------- ボタン操作 ---------- */
els.soundBtn.addEventListener("click", () => {
  muted = !muted;
  els.soundBtn.textContent = muted ? "🔇" : "🔊";
  if(!muted) {
    unlockAudio();
  }
});

els.quitBtn.addEventListener("click", () => {
  gameToken++;
  gameActive = false;
  dakutenWait = false;
  handakutenWait = false;
  if (els.dakutenBtn) els.dakutenBtn.classList.remove("toggle-active");
  if (els.handakutenBtn) els.handakutenBtn.classList.remove("toggle-active");
  clearInterval(timerInterval);
  els.levelUpOverlay.classList.remove("active");
  els.gameOverOverlay.classList.remove("active");
  els.startScreen.classList.remove("hidden");
});

els.startBtn.addEventListener("click", () => {
  unlockAudio(); 
  els.startScreen.classList.add("hidden");
  startGame();
});

/* ---------- 初期化 ---------- */
buildGojuonTable();
renderHeader();

document.addEventListener("touchstart", () => { unlockAudio(); }, {once:true, passive:true});
document.addEventListener("click", () => { unlockAudio(); }, {once:true});
</script>
